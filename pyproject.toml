[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "rune-cheatsheet"
version = "0.1.0"
description = "A unified keybinding cheatsheet generated from your configs — which-key for your whole machine"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "adames" }]
keywords = ["cheatsheet", "keybindings", "dotfiles", "tmux", "neovim", "which-key", "hud"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Utilities",
]

[project.scripts]
rune = "rune.cli:main"

[project.urls]
Homepage = "https://github.com/adames/rune"
Source = "https://github.com/adames/rune"
Issues = "https://github.com/adames/rune/issues"
Changelog = "https://github.com/adames/rune/blob/main/CHANGELOG.md"

[tool.setuptools]
packages = ["rune", "rune.extractors", "rune.render"]
