# Example: the author's dotfiles — mixes inline annotations with native
# extractors, then arranges them into hand-tuned lenses.
#
#   chord -c examples/dotfiles.chord.toml show
#
root = "~/dotfiles"

# Inline @cs / @chord annotations already living in these configs.
[[annotate]]
path = "configs/aerospace.toml"
[[annotate]]
path = "configs/tmux.conf"
[[annotate]]
path = "configs/zshrc"
[[annotate]]
path = "configs/nvim-keymaps.lua"

# Native extractors — real bindings, no annotation needed.
[[extract]]
tool = "tmux"
[[extract]]
tool = "git"

banner = [
  { k = "Caps", v = "Hyper (⌃⌥⌘⇧) — tap = Esc" },
  { k = "Caps+␣", v = "tmux mode" },
  { k = "Tab", v = "cycle lenses" },
]

[[view]]
id = "aero"
label = "AeroSpace"
key = "1"
columns = [ ["windows-focus", "submodes"], ["workspaces", "launchers"], [] ]

[[view]]
id = "term"
label = "Terminal"
key = "2"
columns = [ ["tmux"], ["tmux-prefix"], ["git-aliases"] ]
